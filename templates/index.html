<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ideal College AI</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="mediaOverlay" class="media-overlay hidden" aria-hidden="true">
    <div class="media-modal" role="dialog" aria-modal="true" aria-label="College media">
      <button type="button" class="media-close" id="mediaCloseBtn" aria-label="Close media">&times;</button>
      <div id="mediaContent" class="media-modal-body"></div>
    </div>
  </div>

  <div class="app">
    <header class="header glass-header">
      <div class="header-left">
        <span class="status-dot active" id="statusDot" title="API status"></span>
        <a class="brand-lockup" href="/">
          <img class="college-logo" src="/static/media/images/1.png" alt="Ideal College logo" />
          <div class="brand-group">
            <span class="brand-line">IDEAL COLLEGE AI</span>
            <span class="brand-sub">Voice Assistant for Students</span>
          </div>
        </a>
      </div>

      <div class="header-right">
        <div class="header-pill">
          <span class="pill-label">Language</span>
          <span class="pill-value" id="langDisplay">ENGLISH LIVE</span>
        </div>
        <button type="button" class="info-toggle" id="infoToggle" aria-label="Open campus desk">i</button>
      </div>
    </header>

    <div class="main">
      <div class="chat-panel glass-main">
        <div class="messages" id="messages">
          <div class="welcome" id="welcome">
            <h1 class="welcome-title">Ideal College AI</h1>
            <p class="welcome-sub">
              Ask in English or Telugu. Say <strong>Hello Ideal College AI</strong> and continue naturally.
            </p>

            <div class="suggestions" id="suggestions">
              <button class="suggestion-btn">Show college photos</button>
              <button class="suggestion-btn">Play college video</button>
              <button class="suggestion-btn">What courses are available?</button>
              <button class="suggestion-btn">&#xC15;&#xC3E;&#xC32;&#xC47;&#xC1C0; &#xC15;&#xC4B;&#xC30;&#xC4D;&#xC38;&#xC41;&#xC32;&#xC41; &#xC0F;&#xC2E;&#xC3F;&#xC1F;&#xC3F;?</button>
            </div>
          </div>
        </div>

        <div class="typing-indicator" id="typingIndicator" style="display:none;">
          <span class="typing-label">Ideal College AI is thinking...</span>
        </div>

        <div class="speaker-anim" id="speakerAnim" style="display:none;">
          <div class="wave-container">
            <span class="wave-label">Assistant Speaking</span>
            <button class="stop-speak-btn" id="stopSpeakBtn" type="button">Stop</button>
          </div>
        </div>

        <div class="voice-console">
          <div class="mic-assembly">
            <button type="button" class="jarvis-mic" id="micBtn">
              <span class="mic-ring ring-one"></span>
              <span class="mic-ring ring-two"></span>
              <span class="mic-ring ring-three"></span>
              <svg viewBox="0 0 24 24" width="32" height="32" aria-hidden="true">
                <path fill="currentColor" d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3Z" />
                <path fill="currentColor" d="M19 10v2a7 7 0 0 1-14 0v-2" />
                <path fill="currentColor" d="M11 19h2v3h-2z" />
              </svg>
            </button>
          </div>
          <div class="voice-status" id="voiceStatus">Wake mode active</div>
          <div class="voice-transcript" id="voiceTranscript">Say "Hello Ideal College AI"</div>
          <div class="system-status" id="sysStatus"></div>
        </div>
      </div>

      <aside class="info-panel" id="infoPanel">
        <div class="info-header">
          <h3>Campus Desk</h3>
          <button id="infoClose" class="info-close" type="button" aria-label="Close panel">&times;</button>
        </div>
        <div class="info-content" id="infoContent"></div>
        <div class="news-section">
          <h4>Latest Campus News</h4>
          <div id="newsContent"></div>
        </div>
      </aside>
    </div>
  </div>

  <div class="toast" id="toast" role="status"></div>
  <script src="/static/js/main.js"></script>
</body>
</html>
