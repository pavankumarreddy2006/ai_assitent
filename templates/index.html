<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-black text-white min-h-screen flex flex-col">

    <div class="border-b border-white/10 bg-black p-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
            <h1 class="text-2xl font-bold">IDEAL AI</h1>
        </div>
    </div>

    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6"></div>

    <!-- JARVIS MIC -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2">
        <button onclick="toggleVoiceInput()" id="mic-btn"
                class="mic-button w-20 h-20 rounded-full bg-gradient-to-br from-emerald-400 to-cyan-400 flex items-center justify-center shadow-2xl shadow-emerald-500/50">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m-.5-15a3.5 3.5 0 10-7 0v4a3.5 3.5 0 007 0V6z" />
            </svg>
        </button>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
