<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideal AI • College Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .header-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex flex-col">

    <header class="border-b border-white/10 bg-black/90 backdrop-blur-lg sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-4 h-4 bg-emerald-400 rounded-full animate-pulse"></div>
                <h1 class="header-font text-3xl">IDEAL AI</h1>
            </div>
            <div class="text-sm text-white/70">Ideal College of Arts & Sciences, Kakinada</div>
        </div>
    </header>

    <div class="flex flex-1 max-w-screen-2xl mx-auto w-full overflow-hidden">
        <!-- CHAT AREA -->
        <div class="flex-1 flex flex-col">
            <div id="chat-container" class="flex-1 overflow-y-auto p-8 space-y-8"></div>

            <!-- JARVIS MIC (Voice Only) -->
            <div class="p-8 flex justify-center border-t border-white/10 bg-black">
                <button onclick="toggleVoiceInput()" id="mic-btn"
                        class="mic-button relative flex items-center justify-center w-28 h-28 rounded-full bg-gradient-to-br from-emerald-400 to-teal-500 shadow-2xl shadow-emerald-500/60 hover:scale-110 transition-all">
                    <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="w-14 h-14 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m-.5-15a3.5 3.5 0 10-7 0v4a3.5 3.5 0 007 0V6z" />
                    </svg>
                    <div class="absolute inset-0 rounded-full border-4 border-emerald-300 animate-ping"></div>
                </button>
            </div>
        </div>

        <!-- SIDEBAR (Your original screenshot style) -->
        <div class="w-80 border-l border-white/10 bg-[#111] p-6 overflow-y-auto hidden lg:block">
            <!-- Same as your screenshot - kept exact -->
            <div class="flex items-center gap-3 mb-6">
                <div class="bg-emerald-400 text-black font-bold w-8 h-8 rounded-2xl flex items-center justify-center">IC</div>
                <div>
                    <h3 class="font-semibold">Ideal College</h3>
                    <p class="text-emerald-400 text-xs">NAAC A GRADE</p>
                </div>
            </div>
            <!-- Key Courses, Facilities, Contact - same as before -->
        </div>
    </div>

    <!-- MEDIA MODAL -->
    <div id="media-modal" class="hidden fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center">
        <div class="max-w-5xl w-full mx-6 relative">
            <button onclick="hideMedia()" class="absolute top-4 right-4 text-white text-3xl">✕</button>
            <div id="image-carousel" class="hidden"></div>
            <div id="video-container" class="hidden rounded-3xl overflow-hidden bg-black">
                <video id="modal-video" class="w-full" controls autoplay></video>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
