<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-black text-white min-h-screen flex flex-col">

    <div class="p-4 border-b border-white/10 flex items-center justify-between bg-black">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
            <h1 class="text-2xl font-bold">IDEAL AI</h1>
        </div>
    </div>

    <div id="chat-container" class="flex-1 p-6 overflow-y-auto"></div>

    <!-- Big JARVIS Mic -->
    <div class="fixed bottom-10 left-1/2 -translate-x-1/2">
        <button onclick="toggleVoiceInput()" id="mic-btn"
                class="mic-button w-24 h-24 bg-gradient-to-br from-emerald-400 to-cyan-400 rounded-full flex items-center justify-center shadow-2xl">
            <span class="text-5xl">🎤</span>
        </button>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
